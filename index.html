<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LCB Cinema</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="portfolio/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="#catalog" aria-label="LCB Cinema home">
        <strong>LCB Cinema</strong>
        <span>Personal movie theater service</span>
      </a>

      <nav class="nav" aria-label="LCB Cinema sections">
        <a href="#catalog" data-route="catalog">영화 / 시간표</a>
        <a href="#booking" data-route="booking">빠른 예매</a>
        <a href="#tickets" data-route="tickets">내 예매</a>
        <a href="#store" data-route="store">스토어</a>
        <a href="#community" data-route="community">고객 게시판</a>
        <a href="#watch" data-route="watch">같이 보기</a>
        <a href="#ops" data-route="ops">운영 콘솔</a>
      </nav>

      <div class="stack small">
        <span class="label">Stack</span>
        <p>Spring MVC · JSP · MyBatis · WebSocket</p>
        <a class="text-link" href="docs/">기술 문서</a>
      </div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="search">
          <input id="searchInput" type="search" placeholder="영화, 지점, 게시글 검색">
          <select id="branchInput" aria-label="지점">
            <option value="all">전체 지점</option>
            <option value="gangnam">LCB 강남</option>
            <option value="hongdae">LCB 홍대</option>
            <option value="ilsan">LCB 일산벨라시타</option>
          </select>
          <select id="dayInput" aria-label="상영일">
            <option value="today">오늘</option>
            <option value="tomorrow">내일</option>
            <option value="weekend">이번 주말</option>
          </select>
        </div>
        <div class="user-chip">
          <span class="avatar">L</span>
          <span>leeguck · VIP</span>
        </div>
      </header>

      <main id="view" class="view" tabindex="-1"></main>
    </section>

    <aside id="inspector" class="inspector" aria-label="상세 패널"></aside>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="portfolio/app.js"></script>
</body>
</html>
