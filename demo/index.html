<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LCB Static Demo</title>
  <link rel="icon" href="../src/main/webapp/resources/assets/icons/favicon_LCB.png">
  <style>
    :root {
      --ink: #15171d;
      --muted: #66707a;
      --line: #d9dde3;
      --paper: #f7f7f5;
      --panel: #ffffff;
      --red: #b21f2d;
      --teal: #0f766e;
      --gold: #b98221;
      --screen: #242936;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    button,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 16px clamp(16px, 4vw, 48px);
      background: #17181c;
      color: #fff;
    }

    header a {
      color: rgba(255, 255, 255, .82);
      text-decoration: none;
      font-size: 14px;
    }

    .brand {
      font-weight: 800;
    }

    main {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 320px;
      gap: 0;
    }

    .pane {
      padding: 22px;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }

    .stage {
      padding: 28px;
      background: var(--paper);
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 14px;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .movie-list {
      display: grid;
      gap: 10px;
    }

    .movie {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 12px;
      width: 100%;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .movie[aria-pressed="true"] {
      border-color: var(--red);
      box-shadow: 0 0 0 2px rgba(178, 31, 45, .14);
    }

    .movie img {
      width: 56px;
      height: 76px;
      object-fit: cover;
      border-radius: 4px;
    }

    .movie strong {
      display: block;
      margin-bottom: 5px;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    select {
      min-height: 42px;
      width: 100%;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .screen {
      max-width: 820px;
      margin: 0 auto 28px;
      padding: 14px;
      color: #fff;
      text-align: center;
      border-radius: 6px;
      background: var(--screen);
      box-shadow: 0 12px 28px rgba(21, 23, 29, .18);
    }

    .seat-map {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(8, minmax(32px, 1fr));
      gap: 10px;
    }

    .seat {
      aspect-ratio: 1;
      border: 1px solid #bdc5cf;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-weight: 700;
      color: var(--ink);
    }

    .seat[aria-pressed="true"] {
      color: #fff;
      background: var(--teal);
      border-color: var(--teal);
    }

    .seat:disabled {
      color: #fff;
      background: #8f98a3;
      border-color: #8f98a3;
      cursor: not-allowed;
    }

    .legend {
      max-width: 820px;
      margin: 22px auto 0;
      display: flex;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
      flex-wrap: wrap;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
      border-radius: 3px;
      border: 1px solid var(--line);
      vertical-align: -1px;
      background: #fff;
    }

    .dot.selected {
      background: var(--teal);
      border-color: var(--teal);
    }

    .dot.sold {
      background: #8f98a3;
      border-color: #8f98a3;
    }

    .summary {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    .poster {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .summary-row strong {
      text-align: right;
    }

    .reserve {
      width: 100%;
      min-height: 44px;
      margin-top: 18px;
      border: 0;
      border-radius: 6px;
      color: #fff;
      background: var(--red);
      font-weight: 800;
      cursor: pointer;
    }

    .toast {
      min-height: 24px;
      margin-top: 14px;
      color: var(--teal);
      font-weight: 700;
      font-size: 14px;
    }

    @media (max-width: 1040px) {
      main {
        grid-template-columns: 1fr;
      }

      .pane,
      .summary {
        border-right: 0;
        border-left: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">LCB Cinema Demo</div>
      <a href="../">Portfolio Home</a>
    </header>

    <main>
      <aside class="pane">
        <h1>영화 선택</h1>
        <p class="muted">GitHub Pages용 mock 데모입니다. 서버 통신 없이 예매 흐름만 재현합니다.</p>
        <div class="movie-list" id="movieList"></div>
      </aside>

      <section class="stage" aria-label="좌석 선택">
        <div class="control">
          <label for="theater">극장</label>
          <select id="theater">
            <option>LCB 강남 1관</option>
            <option>LCB 홍대 2관</option>
            <option>LCB 일산벨라시타 3관</option>
          </select>
        </div>
        <div class="control">
          <label for="time">상영 시간</label>
          <select id="time">
            <option>오늘 14:20</option>
            <option>오늘 17:40</option>
            <option>오늘 20:30</option>
          </select>
        </div>
        <div class="screen">SCREEN</div>
        <div class="seat-map" id="seatMap"></div>
        <div class="legend">
          <span><i class="dot"></i>선택 가능</span>
          <span><i class="dot selected"></i>선택됨</span>
          <span><i class="dot sold"></i>예매 완료</span>
        </div>
      </section>

      <aside class="pane summary">
        <img class="poster" id="poster" src="../src/main/webapp/resources/assets/img/poster01@2.jpg" alt="선택한 영화 포스터">
        <h2>예매 요약</h2>
        <div class="summary-row"><span>영화</span><strong id="summaryMovie">반도</strong></div>
        <div class="summary-row"><span>극장</span><strong id="summaryTheater">LCB 강남 1관</strong></div>
        <div class="summary-row"><span>시간</span><strong id="summaryTime">오늘 14:20</strong></div>
        <div class="summary-row"><span>좌석</span><strong id="summarySeats">선택 전</strong></div>
        <div class="summary-row"><span>금액</span><strong id="summaryPrice">0원</strong></div>
        <button class="reserve" id="reserveButton" type="button">예매 확정</button>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
      </aside>
    </main>
  </div>

  <script>
    const movies = [
      { title: "반도", meta: "액션 · 116분", poster: "../src/main/webapp/resources/assets/img/poster01@2.jpg" },
      { title: "알라딘", meta: "판타지 · 128분", poster: "../src/main/webapp/resources/assets/img/poster02@2.jpg" },
      { title: "블루아워", meta: "드라마 · 92분", poster: "../src/main/webapp/resources/assets/img/poster03@2.jpg" },
      { title: "밤쉘", meta: "드라마 · 109분", poster: "../src/main/webapp/resources/assets/img/poster04@2.jpg" }
    ];

    const soldSeats = new Set(["A3", "B6", "C2", "D7"]);
    const selectedSeats = new Set();
    let selectedMovie = movies[0];

    const movieList = document.getElementById("movieList");
    const seatMap = document.getElementById("seatMap");
    const theater = document.getElementById("theater");
    const time = document.getElementById("time");
    const poster = document.getElementById("poster");
    const toast = document.getElementById("toast");

    function renderMovies() {
      movieList.innerHTML = "";
      movies.forEach((movie) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "movie";
        button.setAttribute("aria-pressed", movie.title === selectedMovie.title ? "true" : "false");
        button.innerHTML = `<img src="${movie.poster}" alt=""><span><strong>${movie.title}</strong><span class="muted">${movie.meta}</span></span>`;
        button.addEventListener("click", () => {
          selectedMovie = movie;
          selectedSeats.clear();
          toast.textContent = "";
          renderMovies();
          updateSummary();
        });
        movieList.appendChild(button);
      });
    }

    function renderSeats() {
      seatMap.innerHTML = "";
      ["A", "B", "C", "D", "E", "F"].forEach((row) => {
        for (let number = 1; number <= 8; number += 1) {
          const seatId = `${row}${number}`;
          const button = document.createElement("button");
          button.type = "button";
          button.className = "seat";
          button.textContent = seatId;
          button.disabled = soldSeats.has(seatId);
          button.setAttribute("aria-pressed", selectedSeats.has(seatId) ? "true" : "false");
          button.addEventListener("click", () => {
            if (selectedSeats.has(seatId)) {
              selectedSeats.delete(seatId);
            } else {
              selectedSeats.add(seatId);
            }
            toast.textContent = "";
            updateSummary();
            renderSeats();
          });
          seatMap.appendChild(button);
        }
      });
    }

    function updateSummary() {
      const seats = Array.from(selectedSeats).sort();
      document.getElementById("summaryMovie").textContent = selectedMovie.title;
      document.getElementById("summaryTheater").textContent = theater.value;
      document.getElementById("summaryTime").textContent = time.value;
      document.getElementById("summarySeats").textContent = seats.length ? seats.join(", ") : "선택 전";
      document.getElementById("summaryPrice").textContent = `${(seats.length * 12000).toLocaleString("ko-KR")}원`;
      poster.src = selectedMovie.poster;
      poster.alt = `${selectedMovie.title} 포스터`;
    }

    document.getElementById("reserveButton").addEventListener("click", () => {
      if (!selectedSeats.size) {
        toast.textContent = "좌석을 먼저 선택하세요.";
        return;
      }
      toast.textContent = "정적 데모에서 예매 흐름이 완료되었습니다.";
    });

    theater.addEventListener("change", updateSummary);
    time.addEventListener("change", updateSummary);
    renderMovies();
    renderSeats();
    updateSummary();
  </script>
</body>
</html>
